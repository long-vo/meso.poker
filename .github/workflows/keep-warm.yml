# Keeps the free-tier Render service awake so the first call doesn't race a
# 30-60s cold start. Render wakes a service on any inbound request, so a
# plain GET is enough.
name: Keep warm

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -fsS --retry 3 --retry-all-errors --max-time 90 https://meso-poker.onrender.com/health
